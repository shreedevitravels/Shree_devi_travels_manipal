<!DOCTYPE html>
<html>
<head>
<title>Devi Travels</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    background: url('bg.jpg') no-repeat center center;
    background-size: cover;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    background: linear-gradient(45deg,#0d6efd,#00c6ff);
}

/* CONTAINER */
.container {
    margin: 20px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(0,0,0,0.7);
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
}

h2 {
    text-align: center;
}

/* INPUT */
.input-box {
    margin: 15px 0;
}

.input-box input {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 16px;
}

input::placeholder {
    color: #ccc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    border: none;
    margin-top: 12px;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    color: white;
    box-shadow: 0 0 15px #00c6ff;
}

button:hover {
    transform: scale(1.05);
}

.call-btn {
    background: linear-gradient(45deg,#00ff7f,#00c853);
    box-shadow: 0 0 15px lime;
}

/* 🔥 APK BUTTON */
.apk-btn {
    background: linear-gradient(45deg,#ff9800,#ff5722);
    box-shadow: 0 0 15px orange;
}

</style>
</head>

<body>

<header>
    <img src="logo.png" width="90">
    <h1>Shree Devi Travels Manipal</h1>
</header>

<div class="container">

<h2>🚗 Book Your Ride</h2>

<div class="input-box">
<input type="text" id="name" placeholder="👤 Full Name">
</div>

<div class="input-box">
<input type="tel" id="phone" placeholder="📞 Phone Number">
</div>

<div class="input-box">
<input type="text" id="pickup" placeholder="📍 Pickup Location">
</div>

<div class="input-box">
<input type="text" id="drop" placeholder="🏁 Drop Location">
</div>

<div class="input-box">
<input type="date" id="date">
</div>

<div class="input-box">
<input type="time" id="time">
</div>

<div class="input-box">
<input type="number" id="persons" placeholder="👥 Passengers">
</div>

<button onclick="book()">🚀 Book via WhatsApp</button>

<button class="call-btn" onclick="callNow()">📲 Call Now</button>

<!-- 🔥 DOWNLOAD BUTTON -->
<button class="apk-btn" onclick="downloadApp()">📲 Download App</button>

</div>

<script>

function book(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let pickup=document.getElementById("pickup").value;
let drop=document.getElementById("drop").value;
let date=document.getElementById("date").value;
let time=document.getElementById("time").value;
let persons=document.getElementById("persons").value;

if(name==""||phone==""||pickup==""||drop==""||date==""||time==""||persons==""){
alert("Fill all details ❗");
return;
}

let msg=`🚗 Booking Request

Name: ${name}
Phone: ${phone}
From: ${pickup}
To: ${drop}
Date: ${date}
Time: ${time}
Passengers: ${persons}`;

window.open("https://wa.me/6362635718?text="+encodeURIComponent(msg));
}

function callNow(){
window.open("tel:6362635718");
}

// 🔥 APK DOWNLOAD
function downloadApp(){
window.open("https://drive.google.com/uc?export=download&id=1aWDUBRxvltIPe0dzAZQHKnyP4YWnHScS");
}

</script>

</body>
</html>
